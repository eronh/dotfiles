# window settings
set-option -g status-position bottom
set -g base-index 1
setw -g pane-base-index 1
set-option -g allow-rename on
set-window-option -g automatic-rename off

# set-option -g status-right " #[fg=green]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)#[default] | %H:%M "
# set-option -g status-right " #[fg=green] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)#[default] | %H:%M "
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] #(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/.*/#[fg=green] & #[fg=white,bg=brightblack,nobold,noitalics,nounderscore] /')%Y-%m-%d #[fg=white,bg=brightblack,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %H:%M #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan] #(cut -d '.' -f 1 <<< '#H') "

# list of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

# themes
set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

# automatic restore session
set -g @continuum-restore 'on'

# switch tabs on option-shift-arrow (macos)
bind-key -n M-S-Right next-window
bind-key -n M-S-Left previous-window

bind-key -n C-k clear-history

set-window-option -g window-status-format '#W'
set-window-option -g window-status-current-format '#W'

# bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy"

# run-shell ~/clone/path/resurrect.tmux # only if manually installed
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
